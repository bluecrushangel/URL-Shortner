services:

  postgres:
      image: postgres:15
      restart: always
      environment:
        POSTGRES_USER: admin
        POSTGRES_PASSWORD: secret
        POSTGRES_DB: urlshortener
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  url-service:
    build: ./url-service
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://admin:secret@postgres:5432/urlshortener
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  analytics-service:
    build: ./analytics-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://admin:secret@postgres:5432/urlshortener
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: